<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3;url=http://degusto.co4.in/">

<title>Garage Burger</title>

<link rel="preconnect" href="http://degusto.co4.in">
<link rel="dns-prefetch" href="http://degusto.co4.in">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800&display=swap" rel="stylesheet">

<style>

:root{
--void:#0b0503;
--void2:#1a0d06;
--red:#ff3b1f;
--orange:#ff8c00;
--gold:#ffd23f;
--warm:#fff6ea;
--dim:#ab9384;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins","Segoe UI",Arial,sans-serif;
}

html,body{
height:100%;
}

body{
min-height:100vh;
min-height:100dvh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

overflow:hidden;

background:
radial-gradient(circle at 15% 88%, rgba(255,80,0,.38), transparent 45%),
radial-gradient(circle at 85% 12%, rgba(255,190,0,.25), transparent 45%),
radial-gradient(circle at 50% 50%, var(--void2), var(--void) 72%);

animation:bgPulse 5s ease-in-out infinite alternate;
}

@keyframes bgPulse{
0%{filter:brightness(1);}
100%{filter:brightness(1.22);}
}

/* FAÍSCAS DE FUNDO */

#sparks{
position:fixed;
inset:0;
pointer-events:none;
z-index:1;
}

/* PALCO DO LOGO / BARRA DE CARREGAMENTO */

.wrap{
position:relative;
z-index:2;
display:flex;
flex-direction:column;
align-items:center;
padding:0 24px;
text-align:center;
}

.stage{
position:relative;
width:min(230px,58vw);
}

.stage.done{
animation:pop .38s ease;
}

@keyframes pop{
0%{transform:scale(1);}
45%{transform:scale(1.07);}
100%{transform:scale(1);}
}

.glow{
position:absolute;
inset:-42px;
z-index:0;
border-radius:50%;
filter:blur(6px);
background:radial-gradient(circle, rgba(255,120,0,var(--glow,.18)), transparent 70%);
}

.stage img{
position:relative;
display:block;
width:100%;
height:auto;
z-index:1;
}

.ghost{
filter:grayscale(1) brightness(.32) contrast(1.05);
}

.fill{
position:absolute;
inset:0;
overflow:hidden;
z-index:2;
clip-path:inset(100% 0 0 0);
}

.fill img{
filter:drop-shadow(0 0 18px rgba(255,90,0,.65)) saturate(1.15);
}

.shine{
position:absolute;
inset:-10%;
z-index:3;
pointer-events:none;
mix-blend-mode:overlay;
background:linear-gradient(115deg, transparent 42%, rgba(255,255,255,.4) 50%, transparent 58%);
background-size:250% 250%;
background-position:160% 0%;
animation:sweep 2.4s ease-in-out infinite;
}

@keyframes sweep{
0%{background-position:160% 0%;}
55%,100%{background-position:-60% 0%;}
}

.pct{
position:absolute;
left:50%;
bottom:-32px;
transform:translateX(-50%);
z-index:4;
font-size:13px;
font-weight:700;
letter-spacing:2px;
color:var(--gold);
text-shadow:0 0 12px rgba(255,150,0,.6);
}

.caption{
margin-top:26px;
font-size:14px;
font-weight:500;
letter-spacing:.4px;
color:var(--dim);
}

.caption b{
color:var(--warm);
font-weight:700;
}

.dots span{
opacity:0;
animation:blink 1.2s infinite;
}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}

@keyframes blink{
0%,20%{opacity:0;}
50%{opacity:1;}
100%{opacity:0;}
}

.fallback{
margin-top:16px;
font-size:12px;
color:var(--dim);
text-decoration:none;
border-bottom:1px solid transparent;
transition:color .2s ease, border-color .2s ease;
}

.fallback:hover{
color:var(--gold);
border-color:var(--gold);
}

</style>

</head>

<body>

<canvas id="sparks"></canvas>

<div class="wrap">

<div class="stage" id="stage">
<div class="glow" id="glow"></div>
<img class="ghost" src="https://iili.io/COqYzGe.png" alt="Garage Burger">
<div class="fill" id="fill">
<img src="https://iili.io/COqYzGe.png" alt="">
</div>
<div class="shine"></div>
<span class="pct" id="pct">0%</span>
</div>

<p class="caption"><b>Preparando seu pedido</b><span class="dots"><span>.</span><span>.</span><span>.</span></span></p>

<a class="fallback" href="http://degusto.co4.in/">Não abriu automaticamente? Toque aqui</a>

</div>

<script>

/* ---------- LOGO COMO BARRA DE CARREGAMENTO ---------- */

(function(){

    var DURATION = 1100;
    var URL_DESTINO = "http://degusto.co4.in/";

    var fill = document.getElementById('fill');
    var pctEl = document.getElementById('pct');
    var glow = document.getElementById('glow');
    var stage = document.getElementById('stage');

    var start = null;

    function ease(t){ return 1 - Math.pow(1 - t, 3); }

    function tick(ts){
        if(!start) start = ts;

        var t = Math.min((ts - start) / DURATION, 1);
        var e = ease(t);
        var pct = Math.round(e * 100);

        fill.style.clipPath = 'inset(' + (100 - pct) + '% 0 0 0)';
        pctEl.textContent = pct + '%';
        glow.style.setProperty('--glow', (0.15 + e * 0.4));

        if(t < 1){
            requestAnimationFrame(tick);
        } else {
            stage.classList.add('done');
            setTimeout(function(){
                window.location.href = URL_DESTINO;
            }, 260);
        }
    }

    requestAnimationFrame(tick);

})();

/* ---------- FAÍSCAS (canvas leve) ---------- */

(function(){

    var canvas = document.getElementById('sparks');
    var ctx = canvas.getContext('2d');
    var w, h;

    function resize(){
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    var cores = ['#ff4500', '#ff8c00', '#ffd700'];

    function criarFaisca(){
        return {
            x: Math.random() * w,
            y: h + 10,
            r: Math.random() * 1.8 + 1,
            vy: Math.random() * 1.1 + 0.5,
            vx: (Math.random() - 0.5) * 0.4,
            vida: 1,
            decaimento: Math.random() * 0.008 + 0.004,
            cor: cores[Math.floor(Math.random() * cores.length)]
        };
    }

    var faiscas = [];
    for(var i = 0; i < 26; i++){
        var f = criarFaisca();
        f.y = Math.random() * h;
        faiscas.push(f);
    }

    function loop(){
        ctx.clearRect(0, 0, w, h);

        faiscas.forEach(function(f, i){
            f.x += f.vx;
            f.y -= f.vy;
            f.vida -= f.decaimento;

            if(f.vida <= 0 || f.y < -10){
                faiscas[i] = criarFaisca();
                return;
            }

            ctx.beginPath();
            ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
            ctx.fillStyle = f.cor;
            ctx.globalAlpha = Math.max(f.vida, 0);
            ctx.shadowColor = f.cor;
            ctx.shadowBlur = 6;
            ctx.fill();
        });

        ctx.globalAlpha = 1;
        requestAnimationFrame(loop);
    }
    loop();

})();

</script>

</body>
</html>
