<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dê Gusto</title>

<meta http-equiv="refresh" content="2;url=http://degusto.co4.in/">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;

height:100vh;

background:
linear-gradient(135deg,#111,#1a1a1a,#000);

overflow:hidden;

}

body:before{

content:"";

position:absolute;
width:200%;
height:200%;

background:
radial-gradient(circle,#ff1f4d22 0%,transparent 45%),
radial-gradient(circle,#ffb40022 0%,transparent 35%);

animation:bg 12s linear infinite;

}

@keyframes bg{

100%{
transform:rotate(360deg);
}

}

.card{

position:relative;
z-index:2;

width:420px;
max-width:92%;

padding:45px;

text-align:center;

border-radius:30px;

background:rgba(255,255,255,.07);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 0 60px rgba(255,0,80,.25);

}

.logo{

width:170px;

margin:auto;

animation:logo 1.5s infinite alternate;

filter:
drop-shadow(0 0 15px #ff0048);

}

@keyframes logo{

100%{
transform:scale(1.05);
}

}

h1{

margin-top:25px;

font-size:34px;

color:white;

}

p{

margin-top:10px;

color:#ddd;

font-size:16px;

}

.progress{

margin-top:35px;

height:8px;

background:#333;

border-radius:50px;

overflow:hidden;

}

.bar{

height:100%;

background:linear-gradient(90deg,#ff0048,#ffae00);

width:0;

animation:load 2s linear forwards;

}

@keyframes load{

100%{

width:100%;

}

}

.loader{

margin:25px auto;

width:55px;
height:55px;

border-radius:50%;

border:5px solid rgba(255,255,255,.1);

border-top:5px solid #ff0048;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

small{

display:block;

margin-top:20px;

color:#888;

}

a{

color:#fff;

text-decoration:none;

font-weight:bold;

}

</style>

<script>

setTimeout(function(){

window.location="http://degusto.co4.in/";

},2000);

</script>

</head>

<body>

<div class="card">

<img class="logo"
src="https://iili.io/C1muS7s.png"
alt="Logo">

<h1>DÊ GUSTO</h1>

<p>Preparando sua experiência...</p>

<div class="loader"></div>

<div class="progress">

<div class="bar"></div>

</div>

<small>

Caso não seja redirecionado automaticamente,

<br><br>

<a href="http://degusto.co4.in/">

Clique aqui

</a>

</small>

</div>

</body>

</html>
