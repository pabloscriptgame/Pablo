<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="2;url=https://naruarpg.page.gd/">
<title>Bem-vindo(a)!</title>
<style>
  :root{
    --brasa1:#C4291B;
    --brasa2:#9E1F14;
    --creme:#FDF6EA;
    --creme2:#F3E9D6;
    --ouro:#E8A93B;
    --escuro:#17110D;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;
    background:var(--escuro);
    overflow:hidden;
    font-family:'Segoe UI',Arial,sans-serif;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  /* fundo com brilho pulsante tipo brasa */
  .glow{
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 20% 30%, rgba(196,41,27,0.35), transparent 45%),
      radial-gradient(circle at 80% 70%, rgba(232,169,59,0.28), transparent 45%),
      radial-gradient(circle at 50% 50%, rgba(196,41,27,0.15), transparent 60%);
    animation: pulse 3s ease-in-out infinite alternate;
  }
  @keyframes pulse{
    0%{opacity:.6; transform:scale(1);}
    100%{opacity:1; transform:scale(1.08);}
  }

  /* particulas subindo tipo fumaça/faísca */
  .spark{
    position:absolute;
    bottom:-10px;
    width:6px;height:6px;
    border-radius:50%;
    background:var(--ouro);
    box-shadow:0 0 8px 2px var(--ouro);
    animation: rise linear infinite;
    opacity:0;
  }
  @keyframes rise{
    0%{transform:translateY(0) translateX(0); opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(-100vh) translateX(var(--drift,20px)); opacity:0;}
  }

  .card{
    position:relative;
    z-index:2;
    text-align:center;
    padding:50px 40px;
    background:rgba(23,17,13,0.55);
    border:1px solid rgba(232,169,59,0.35);
    border-radius:20px;
    backdrop-filter:blur(6px);
    box-shadow:0 0 40px rgba(196,41,27,0.35);
    animation: fadeIn .9s ease-out;
  }
  @keyframes fadeIn{
    from{opacity:0; transform:translateY(20px) scale(.96);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }

  h1{
    font-size:2.4rem;
    color:var(--creme);
    letter-spacing:1px;
    margin-bottom:8px;
    text-shadow:0 0 18px rgba(232,169,59,0.6);
  }
  h1 span{
    color:var(--ouro);
    display:block;
    font-size:1rem;
    letter-spacing:4px;
    text-transform:uppercase;
    margin-bottom:10px;
    opacity:.85;
  }
  p{
    color:var(--creme2);
    font-size:1rem;
    margin-top:14px;
    opacity:.9;
  }

  .loader{
    margin:30px auto 10px;
    width:60px;
    height:60px;
    position:relative;
  }
  .loader::before,.loader::after{
    content:'';
    position:absolute;
    inset:0;
    border-radius:50%;
    border:3px solid transparent;
    border-top-color:var(--brasa1);
    animation:spin 1s linear infinite;
  }
  .loader::after{
    border-top-color:var(--ouro);
    animation-duration:1.4s;
    animation-direction:reverse;
    inset:8px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .bar{
    width:220px;
    height:4px;
    margin:20px auto 0;
    background:rgba(255,255,255,0.12);
    border-radius:4px;
    overflow:hidden;
  }
  .bar div{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--brasa1),var(--ouro));
    animation:load 2s linear forwards;
  }
  @keyframes load{ to{ width:100%; } }

  a.manual{
    display:inline-block;
    margin-top:22px;
    color:var(--ouro);
    text-decoration:none;
    font-size:.85rem;
    border-bottom:1px solid transparent;
    transition:.3s;
  }
  a.manual:hover{ border-color:var(--ouro); }
</style>
</head>
<body>

  <div class="glow"></div>

  <div class="card">
    <h1><span>Estamos preparando tudo</span>Seja muito bem-vindo(a)! 🔥</h1>
    <div class="loader"></div>
    <div class="bar"><div></div></div>
    <p>Redirecionando para o cardápio…</p>
    <a class="manual" href="https://naruarpg.page.gd/">Clique aqui se não for redirecionado</a>
  </div>

  <script>
    // gera faíscas subindo pela tela
    const total = 26;
    for(let i=0;i<total;i++){
      const s = document.createElement('div');
      s.className = 'spark';
      const left = Math.random()*100;
      const delay = Math.random()*3;
      const dur = 3 + Math.random()*3;
      const drift = (Math.random()*80-40) + 'px';
      s.style.left = left+'vw';
      s.style.animationDelay = delay+'s';
      s.style.animationDuration = dur+'s';
      s.style.setProperty('--drift', drift);
      s.style.width = s.style.height = (3+Math.random()*4)+'px';
      document.body.appendChild(s);
    }

    // redirecionamento via JS (backup ao meta refresh)
    setTimeout(function(){
      window.location.href = "https://casa.gamer.gd/";
    }, 2000);
  </script>

</body>
</html>
